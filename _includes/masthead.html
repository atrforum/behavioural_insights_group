{%- comment -%}
  Local override of MM's masthead to render two logos (BIG + ATRF) on the left
  instead of the default text title or single site.logo.
{%- endcomment -%}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <a class="site-logo site-logo--multi" href="{{ '/' | relative_url }}">
          <img src="{{ '/img/logo_1.png' | relative_url }}" alt="ATRF Behavioural Insights Group" class="site-logo__img site-logo__img--big">
          <span class="site-logo__sep" aria-hidden="true"></span>
          <img src="{{ '/img/ATRF_logo_large-white-Australasian-Transport-Research-Forum-Inc.png' | relative_url }}" alt="Australasian Transport Research Forum" class="site-logo__img site-logo__img--atrf">
        </a>

        <ul class="visible-links">
          {%- for link in site.data.navigation.main -%}
            <li class="masthead__menu-item">
              <a
                href="{{ link.url | relative_url }}"
                {% if link.description %} title="{{ link.description }}"{% endif %}
                {% if link.target %} target="{{ link.target }}"{% endif %}
              >{{ link.title }}</a>
            </li>
          {%- endfor -%}
        </ul>

        {% if site.search == true %}
        <button class="search__toggle" type="button">
          <span class="visually-hidden">{{ site.data.ui-text[site.locale].search_label | default: "Toggle search" }}</span>
          <i class="fas fa-search"></i>
        </button>
        {% endif %}

        <button class="greedy-nav__toggle hidden" type="button">
          <span class="visually-hidden">{{ site.data.ui-text[site.locale].menu_label | default: "Toggle menu" }}</span>
          <div class="navicon"></div>
        </button>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
