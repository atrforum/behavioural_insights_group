<section id="research-needs">
  <h2>Research Needs</h2>

  <p>ATRF-BIG is compiling a list of behavioural-insights research needs across Australasia.
  This includes:</p>

  <ul>
    {% for item in site.data.research_needs %}
      <li>
        {% if item.url and item.url != "#" %}
          <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer">{{ item.text }}</a>
        {% else %}
          {{ item.text }}
        {% endif %}
      </li>
    {% endfor %}
  </ul>
</section>
