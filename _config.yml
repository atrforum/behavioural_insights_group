url: https://janzill.github.io
baseurl: /atrf_bi_website

# Site identity
title: ATRF-BIG
email: # TODO: chair contact email
description: "The ATRF Behavioural Insights Group (BIG) is a standing group of the Australasian Transport Research Forum, bringing together researchers, practitioners and industry leaders to promote behavioural insights research in Australia and New Zealand and to support its application in transport."

# --- Minimal Mistakes (remote theme) ---
remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: contrast # dark, air, mint, sunrise, aqua, contrast, neon
masthead_title: " "  # blank so the page title doesn't double up next to nav
search: false

plugins:
  - jekyll-feed
  - jekyll-remote-theme
  - jekyll-include-cache

defaults:
  - scope: { path: "" }
    values:
      author_profile: false
      show_date: false

# Footer social icons
footer:
  links:
    - label: LinkedIn
      icon: fab fa-fw fa-linkedin
      url: https://www.linkedin.com/groups/18327006
    - label: GitHub
      icon: fab fa-fw fa-github
      url: https://github.com/janzill/atrf_bi_website

# Top-level social fallback (used elsewhere)
social:
  - title: linkedin
    url: https://www.linkedin.com/groups/18327006
  - title: github
    url: https://github.com/janzill/atrf_bi_website

# --- Build settings ---
markdown: kramdown
permalink: pretty

sass:
  quiet_deps: true
  silence_deprecations:
    - slash-div

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
  - LICENSE
